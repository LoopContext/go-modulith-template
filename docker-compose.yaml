services:
  db:
    image: postgres:18-alpine
    container_name: modulith_db
    ports:
      - "${DB_PORT:-5432}:5432"
    env_file:
      - .env.docker
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
