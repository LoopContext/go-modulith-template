# Staging environment configuration
# This config mirrors production settings for testing before deployment
env: staging
log_level: info  # Use info level, not debug
http_port: 8080
grpc_port: 9050
db_dsn: ${DB_DSN}  # Use environment variable for secrets

# Database connection pool settings (production-like)
db_max_open_conns: 50
db_max_idle_conns: 25
db_conn_max_lifetime: 5m
db_connect_timeout: 5s  # Shorter timeout in staging

# CORS configuration - specify exact origins, no wildcards
cors_allowed_origins:
  - https://staging.example.com
  - https://staging-app.example.com

# Rate limiting enabled in staging
rate_limit_enabled: true
rate_limit_rps: 100    # requests per second per IP
rate_limit_burst: 50   # burst size

# Timeouts (production-like)
read_timeout: 5s
write_timeout: 10s
shutdown_timeout: 30s

# Observability - enable OTLP exporter
otlp_endpoint: ${OTLP_ENDPOINT}  # e.g., otel-collector:4317

auth:
  # JWT secret MUST come from environment variable in staging/prod
  jwt_secret: ${JWT_SECRET}
  oauth:
    enabled: false  # Enable as needed
    auto_link_by_email: true
    base_url: https://staging.example.com
    token_encryption_key: ${OAUTH_TOKEN_ENCRYPTION_KEY}
    providers:
      google:
        enabled: false
        client_id: ${GOOGLE_CLIENT_ID}
        client_secret: ${GOOGLE_CLIENT_SECRET}
        scopes:
          - email
          - profile
      github:
        enabled: false
        client_id: ${GITHUB_CLIENT_ID}
        client_secret: ${GITHUB_CLIENT_SECRET}
        scopes:
          - user:email
          - read:user

