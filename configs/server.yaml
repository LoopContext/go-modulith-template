env: dev
log_level: debug  # debug, info, warn, error
http_port: 8000
grpc_port: 9000
service_name: modulith-server  # Service name for OpenTelemetry resource
db_dsn: postgres://postgres:postgres@localhost:5432/modulith_demo?sslmode=disable

# Database connection pool settings
db_max_open_conns: 25
db_max_idle_conns: 25
db_conn_max_lifetime: 5m
db_connect_timeout: 10s  # Initial connection timeout

# CORS configuration (default: allow all origins)
cors_allowed_origins:
  - "*"
  # For production, specify exact origins:
  # - https://example.com
  # - https://app.example.com

# Rate limiting (disabled by default in dev)
rate_limit_enabled: false
rate_limit_rps: 100    # requests per second per IP
rate_limit_burst: 50   # burst size

# Timeouts
read_timeout: 5s       # HTTP server read timeout
write_timeout: 10s     # HTTP server write timeout
request_timeout: 30s   # Request handler timeout (middleware)
shutdown_timeout: 30s  # Graceful shutdown timeout

# Valkey configuration (Replaces Redis)
valkey_addr: localhost:6379
valkey_password: ""
valkey_db: 0
valkey_pool_size: 10
valkey_min_idle_conns: 2

# Internationalization
default_locale: en     # Default locale for i18n (en, es)

# Swagger/OpenAPI documentation
# swagger_api_title: Modulith API  # API title shown in Swagger UI

auth:
  jwt_secret: monolith-secret-key-at-least-32-bytes-long
  oauth:
    enabled: false
    auto_link_by_email: true
    base_url: http://localhost:8000
    token_encryption_key: your-32-byte-encryption-key-here!!
    providers:
      google:
        enabled: false
        client_id: your-google-client-id
        client_secret: your-google-client-secret
        scopes:
          - email
          - profile
      facebook:
        enabled: false
        client_id: your-facebook-app-id
        client_secret: your-facebook-app-secret
        scopes:
          - email
          - public_profile
      github:
        enabled: false
        client_id: your-github-client-id
        client_secret: your-github-client-secret
        scopes:
          - user:email
          - read:user
      microsoft:
        enabled: false
        client_id: your-microsoft-client-id
        client_secret: your-microsoft-client-secret
        scopes:
          - openid
          - email
          - profile
      twitter:
        enabled: false
        client_id: your-twitter-api-key
        client_secret: your-twitter-api-secret
      apple:
        enabled: false
        client_id: your-services-id
        team_id: your-team-id
        key_id: your-key-id
        private_key_path: /path/to/AuthKey.p8
        scopes:
          - email
          - name
