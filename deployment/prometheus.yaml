# Prometheus configuration for the Go Modulith template
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'local'
    environment: 'development'

# Alertmanager configuration (optional, commented out)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ['alertmanager:9093']

# Load rules once and periodically evaluate them (optional, commented out)
# rule_files:
#   - "alert_rules.yml"

# Scrape configurations
scrape_configs:
  # Scrape Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Scrape the modulith application
  - job_name: 'modulith-server'
    static_configs:
      - targets: ['host.docker.internal:8080']  # Use host.docker.internal to reach host from container
    metrics_path: '/metrics'
    scrape_interval: 10s
    scrape_timeout: 5s

# Note: In Kubernetes, use service discovery instead:
# - job_name: 'modulith-server'
#   kubernetes_sd_configs:
#     - role: pod
#   relabel_configs:
#     - source_labels: [__meta_kubernetes_pod_label_app]
#       regex: modulith-server
#       action: keep

