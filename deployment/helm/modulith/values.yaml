# Default values for modulith.
# This chart supports deploying the main server or individual modules

# Deployment mode: "server" (monolith) or "module" (individual module)
deploymentType: server

# Module name (only used when deploymentType=module, e.g., "auth")
moduleName: ""

replicaCount: 1

image:
  # Repository will be suffixed with deploymentType: modulith-server or modulith-{moduleName}
  repository: modulith
  pullPolicy: IfNotPresent
  tag: "latest"

service:
  type: ClusterIP
  httpPort: 8080
  grpcPort: 9050

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

podDisruptionBudget:
  enabled: false
  minAvailable: 1

resources:
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines or set them in values.yaml.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

nodeSelector: {}

tolerations: []

affinity: {}

config:
  env: prod
  dbDsn: "postgres://user:pass@postgresql:5432/db"
  jwtSecret: "change-me-in-production"

# Database migrations configuration
migrations:
  enabled: true
  backoffLimit: 3
  resources:
    limits:
      cpu: 500m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi

# Health check configuration
healthChecks:
  startup:
    path: /healthz
    failureThreshold: 30
    periodSeconds: 2
    initialDelaySeconds: 0
  liveness:
    path: /healthz
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 5
  readiness:
    path: /readyz
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 3
