# Example values for deploying the auth module independently
deploymentType: module
moduleName: auth
replicaCount: 2

image:
  repository: modulith
  pullPolicy: IfNotPresent
  tag: "v1.0.0"

service:
  type: ClusterIP
  httpPort: 8000
  grpcPort: 9000

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

podDisruptionBudget:
  enabled: true
  minAvailable: 1

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 250m
    memory: 128Mi

config:
  env: prod
  dbDsn: "postgres://user:pass@postgresql:5432/db"
  jwtSecret: "change-me-in-production"

