syntax = "proto3";

package auth.v1;

import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";
import "buf/validate/validate.proto";

option go_package = "github.com/cmelgarejo/go-modulith-template/gen/go/proto/auth/v1;authv1";

service AuthService {
  // RequestLogin initiates the login process by sending a magic code to email or phone
  rpc RequestLogin(RequestLoginRequest) returns (RequestLoginResponse) {
    option (google.api.http) = {
      post: "/v1/auth/login/request"
      body: "*"
    };
  }

  // CompleteLogin keeps the code and verifies it to return a token
  rpc CompleteLogin(CompleteLoginRequest) returns (CompleteLoginResponse) {
    option (google.api.http) = {
      post: "/v1/auth/login/complete"
      body: "*"
    };
  }

  // RefreshToken exchanges a refresh token for a new access token
  rpc RefreshToken(RefreshTokenRequest) returns (RefreshTokenResponse) {
    option (google.api.http) = {
      post: "/v1/auth/token/refresh"
      body: "*"
    };
  }

  // Logout invalidates the current session and blacklists the token
  rpc Logout(LogoutRequest) returns (LogoutResponse) {
    option (google.api.http) = {
      post: "/v1/auth/logout"
      body: "*"
    };
  }

  // GetProfile returns the current user's profile (requires authentication)
  rpc GetProfile(GetProfileRequest) returns (GetProfileResponse) {
    option (google.api.http) = {
      get: "/v1/auth/profile"
    };
  }

  // UpdateProfile updates the current user's profile (requires authentication)
  rpc UpdateProfile(UpdateProfileRequest) returns (UpdateProfileResponse) {
    option (google.api.http) = {
      put: "/v1/auth/profile"
      body: "*"
    };
  }

  // ChangeEmail initiates email change by sending verification to new email
  rpc ChangeEmail(ChangeEmailRequest) returns (ChangeEmailResponse) {
    option (google.api.http) = {
      post: "/v1/auth/email/change"
      body: "*"
    };
  }

  // ChangePhone initiates phone change by sending verification to new phone
  rpc ChangePhone(ChangePhoneRequest) returns (ChangePhoneResponse) {
    option (google.api.http) = {
      post: "/v1/auth/phone/change"
      body: "*"
    };
  }

  // ListSessions returns all active sessions for the current user
  rpc ListSessions(ListSessionsRequest) returns (ListSessionsResponse) {
    option (google.api.http) = {
      get: "/v1/auth/sessions"
    };
  }

  // RevokeSession revokes a specific session
  rpc RevokeSession(RevokeSessionRequest) returns (RevokeSessionResponse) {
    option (google.api.http) = {
      delete: "/v1/auth/sessions/{session_id}"
    };
  }

  // RevokeAllSessions revokes all sessions except the current one
  rpc RevokeAllSessions(RevokeAllSessionsRequest) returns (RevokeAllSessionsResponse) {
    option (google.api.http) = {
      post: "/v1/auth/sessions/revoke-all"
      body: "*"
    };
  }

  // =========== OAuth External Providers ===========

  // GetOAuthProviders returns the list of enabled OAuth providers
  rpc GetOAuthProviders(GetOAuthProvidersRequest) returns (GetOAuthProvidersResponse) {
    option (google.api.http) = {
      get: "/v1/auth/oauth/providers"
    };
  }

  // InitiateOAuth starts the OAuth flow for a provider
  rpc InitiateOAuth(InitiateOAuthRequest) returns (InitiateOAuthResponse) {
    option (google.api.http) = {
      post: "/v1/auth/oauth/{provider}/start"
      body: "*"
    };
  }

  // CompleteOAuth handles the OAuth callback and returns tokens
  rpc CompleteOAuth(CompleteOAuthRequest) returns (CompleteOAuthResponse) {
    option (google.api.http) = {
      post: "/v1/auth/oauth/callback"
      body: "*"
    };
  }

  // LinkExternalAccount links an external provider to the current user (requires auth)
  rpc LinkExternalAccount(LinkExternalAccountRequest) returns (LinkExternalAccountResponse) {
    option (google.api.http) = {
      post: "/v1/auth/oauth/{provider}/link"
      body: "*"
    };
  }

  // UnlinkExternalAccount unlinks an external provider from the current user (requires auth)
  rpc UnlinkExternalAccount(UnlinkExternalAccountRequest) returns (UnlinkExternalAccountResponse) {
    option (google.api.http) = {
      delete: "/v1/auth/oauth/{provider}/unlink"
    };
  }

  // ListLinkedAccounts returns the external accounts linked to the current user (requires auth)
  rpc ListLinkedAccounts(ListLinkedAccountsRequest) returns (ListLinkedAccountsResponse) {
    option (google.api.http) = {
      get: "/v1/auth/oauth/accounts"
    };
  }
}

// --- Login Messages ---

// RequestLoginRequest initiates the login process by sending a magic code.
// Provide either email OR phone (exactly one is required).
message RequestLoginRequest {
  oneof contact_info {
    option (buf.validate.oneof).required = true;
    // Email address. One of email or phone must be provided.
    string email = 1 [(buf.validate.field).string.email = true];
    // Phone number in E.164 format, e.g., +1234567890. One of email or phone must be provided.
    string phone = 2 [(buf.validate.field).string.pattern = "^\\+?[1-9]\\d{1,14}$"];
  }
}

message RequestLoginResponse {
  bool success = 1;
  string message = 2; // e.g. "Magic code sent"
}

// CompleteLoginRequest completes the login process by verifying the magic code.
// Provide either email OR phone (exactly one is required), plus the 6-digit code.
message CompleteLoginRequest {
  oneof contact_info {
    option (buf.validate.oneof).required = true;
    // Email address. One of email or phone must be provided.
    string email = 1 [(buf.validate.field).string.email = true];
    // Phone number in E.164 format, e.g., +1234567890. One of email or phone must be provided.
    string phone = 2 [(buf.validate.field).string.pattern = "^\\+?[1-9]\\d{1,14}$"];
  }
  // 6-digit magic code received via email or SMS.
  string code = 3 [(buf.validate.field).string = {
    len: 6,
    pattern: "^[0-9]{6}$"
  }];
}

message CompleteLoginResponse {
  string access_token = 1; // JWS
  string refresh_token = 2; // JWS
  int64 expires_in = 3; // Seconds
}

// --- Token Messages ---

message RefreshTokenRequest {
  string refresh_token = 1 [(buf.validate.field).string = {
    min_len: 1
  }];
}

message RefreshTokenResponse {
  string access_token = 1;
  string refresh_token = 2;
  int64 expires_in = 3;
}

message LogoutRequest {
  // Optional: revoke all sessions, not just the current one
  bool revoke_all = 1;
}

message LogoutResponse {
  bool success = 1;
  string message = 2;
}

// --- Profile Messages ---

message User {
  string id = 1;
  string email = 2;
  string phone = 3;
  string display_name = 4;
  string avatar_url = 5;
  google.protobuf.Timestamp created_at = 6;
  google.protobuf.Timestamp updated_at = 7;
}

message GetProfileRequest {}

message GetProfileResponse {
  User user = 1;
}

message UpdateProfileRequest {
  // Optional fields - validation only applies when field is set
  string display_name = 1 [(buf.validate.field).string.max_len = 100];
  string avatar_url = 2 [(buf.validate.field).string.uri = true];
}

message UpdateProfileResponse {
  User user = 1;
}

message ChangeEmailRequest {
  string new_email = 1 [(buf.validate.field).string = {
    email: true,
    min_len: 1
  }];
}

message ChangeEmailResponse {
  bool success = 1;
  string message = 2; // e.g. "Verification code sent to new email"
}

message ChangePhoneRequest {
  string new_phone = 1 [(buf.validate.field).string = {
    pattern: "^\\+?[1-9]\\d{1,14}$",
  }];
}

message ChangePhoneResponse {
  bool success = 1;
  string message = 2; // e.g. "Verification code sent to new phone"
}

// --- Session Messages ---

message Session {
  string id = 1;
  string user_agent = 2;
  string ip_address = 3;
  google.protobuf.Timestamp created_at = 4;
  google.protobuf.Timestamp last_active_at = 5;
  bool is_current = 6;
}

message ListSessionsRequest {}

message ListSessionsResponse {
  repeated Session sessions = 1;
}

message RevokeSessionRequest {
  string session_id = 1 [(buf.validate.field).string.min_len = 1];
}

message RevokeSessionResponse {
  bool success = 1;
}

message RevokeAllSessionsRequest {
  // If true, also revoke the current session (effectively logging out)
  bool include_current = 1;
}

message RevokeAllSessionsResponse {
  int32 revoked_count = 1;
}

// --- OAuth Messages ---

message OAuthProvider {
  string name = 1;        // e.g., "google", "facebook", "github"
  string display_name = 2; // e.g., "Google", "Facebook", "GitHub"
  bool enabled = 3;
}

message GetOAuthProvidersRequest {}

message GetOAuthProvidersResponse {
  repeated OAuthProvider providers = 1;
}

message InitiateOAuthRequest {
  string provider = 1 [(buf.validate.field).string = {
    min_len: 1,
    in: ["google", "facebook", "github", "apple", "microsoft"]
  }];
  string redirect_url = 2 [(buf.validate.field).string = {
    uri: true,
    min_len: 1
  }];
}

message InitiateOAuthResponse {
  string auth_url = 1;      // URL to redirect the user to for OAuth
  string state = 2;         // State token for CSRF protection
}

message CompleteOAuthRequest {
  string provider = 1 [(buf.validate.field).string = {
    min_len: 1,
    in: ["google", "facebook", "github", "apple", "microsoft"]
  }];
  string code = 2 [(buf.validate.field).string.min_len = 1];
  string state = 3 [(buf.validate.field).string.min_len = 1];
}

message CompleteOAuthResponse {
  string access_token = 1;
  string refresh_token = 2;
  int64 expires_in = 3;
  bool is_new_user = 4;     // True if a new user was created
  User user = 5;
}

message LinkExternalAccountRequest {
  string provider = 1 [(buf.validate.field).string = {
    min_len: 1,
    in: ["google", "facebook", "github", "apple", "microsoft"]
  }];
  string redirect_url = 2 [(buf.validate.field).string = {
    uri: true,
    min_len: 1
  }];
}

message LinkExternalAccountResponse {
  string auth_url = 1;
  string state = 2;
}

message UnlinkExternalAccountRequest {
  string provider = 1 [(buf.validate.field).string = {
    min_len: 1,
    in: ["google", "facebook", "github", "apple", "microsoft"]
  }];
}

message UnlinkExternalAccountResponse {
  bool success = 1;
  string message = 2;
}

message ExternalAccount {
  string id = 1;
  string provider = 2;
  string provider_user_id = 3;
  string email = 4;
  string name = 5;
  string avatar_url = 6;
  google.protobuf.Timestamp linked_at = 7;
}

message ListLinkedAccountsRequest {}

message ListLinkedAccountsResponse {
  repeated ExternalAccount accounts = 1;
}
