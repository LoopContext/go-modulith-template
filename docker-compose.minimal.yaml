services:
  db:
    image: postgres:18-alpine
    container_name: modulith_db
    ports:
      - "${DB_PORT:-5432}:5432"
    env_file:
      - .env.docker
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - modulith-network

  valkey:
    image: valkey/valkey:8.0-alpine
    container_name: modulith_valkey
    ports:
      - "${VALKEY_PORT:-6379}:6379"
    command: valkey-server --appendonly yes
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - modulith-network

volumes:
  postgres_data:
  valkey_data:

networks:
  modulith-network:
    driver: bridge

