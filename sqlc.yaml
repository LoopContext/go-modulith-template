version: "2"
sql:
  - engine: "postgresql"
    queries: "modules/auth/internal/db/query/"
    schema: "modules/auth/resources/db/migration"
    gen:
      go:
        package: "store"
        out: "modules/auth/internal/db/store"
        sql_package: "pgx/v5"
        emit_interface: true
        emit_json_tags: true

