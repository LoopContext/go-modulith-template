version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - revive
    - gosec
    - misspell
    - unparam
    - prealloc
    - bodyclose
    - sqlclosecheck
    - gocritic
    - gocyclo
    - cyclop
    - gocognit
    - nestif
    - funlen
    - nakedret
    - copyloopvar
    - whitespace
    - wsl_v5
    - goconst
    - loggercheck
    - wrapcheck
    - sloglint

linters-settings:
  revive:
    rules:
      - name: exported
        arguments:
          - disableStutteringCheck
  gocritic:
    enabled-tags:
      - diagnostic
      - style
      - performance
    disabled-checks:
      - wrapperFunc
  funlen:
    lines: 100
    statements: 50
  gocyclo:
    min-complexity: 15
  nestif:
    min-complexity: 5
  goconst:
    min-len: 3
    min-occurrences: 3
  wrapcheck:
    ignorePackageGlobs:
      - google.golang.org/grpc/status
      - google.golang.org/grpc/*
    ignoreSigs:
      - google.golang.org/grpc/status.Error

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-rules:
    - path: modules/auth/internal/service/service.go
      linters:
        - wrapcheck
      source: "google.golang.org/grpc/status"
