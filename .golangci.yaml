version: '2'

run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - revive
    - gosec
    - misspell
    - unparam
    - prealloc
    - bodyclose
    - sqlclosecheck
    - gocritic
    - gocyclo
    - cyclop
    - gocognit
    - nestif
    - funlen
    - nakedret
    - copyloopvar
    - whitespace
    - wsl_v5
    - goconst
    - loggercheck
    - wrapcheck
    - sloglint

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
